<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flight Display</title>

<style>
:root {
  --bg:#06111f;
  --text:#ffffff;
  --muted:#9eb3c9;
  --accent:#00a3e0;
}

body {
  margin:0;
  width:100vw;
  height:100vh;
  background:linear-gradient(145deg,#030811,var(--bg));
  color:var(--text);
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
}

.screen {
  width:90vw;
  max-width:1100px;
  height:85vh;
  padding:30px;
  border-radius:25px;
  background:#06111f;
  display:flex;
  flex-direction:column;
  gap:20px;
}

header {
  display:flex;
  justify-content:space-between;
  color:var(--muted);
}

.flight {
  font-size:120px;
  font-weight:bold;
  text-align:center;
}

.route {
  font-size:60px;
  text-align:center;
}

.status {
  text-align:center;
  color:var(--accent);
  font-size:30px;
}

.time {
  text-align:center;
  font-size:80px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.box {
  background:#0b1f36;
  padding:10px;
  border-radius:10px;
}

.debug {
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<div class="screen">

<header>
<div>Flight Display v0.7-live</div>
<div id="clock"></div>
</header>

<div class="flight">AY957</div>
<div class="route">HEL → ARN</div>
<div class="status" id="status">LOADING</div>
<div class="time" id="time">--</div>

<div class="grid">
<div class="box">Korkeus<br><span id="alt">--</span></div>
<div class="box">Nopeus<br><span id="spd">--</span></div>
<div class="box">Suunta<br><span id="hdg">--</span></div>
<div class="box">Sijainti<br><span id="pos">--</span></div>
</div>

<div class="debug" id="debug"></div>

</div>

<script>

const PROXY = "https://script.google.com/macros/s/AKfycbw6IsyzgvOZtdpqCO5aDQUnH6UlSm2Q8LJTNqz-k4M90-YQGP_YdB7LdK6Wt0RmQZ6x_A/exec";
const CALLSIGN = "FIN957";

function updateClock(){
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("fi-FI",{hour:'2-digit',minute:'2-digit'});
}

function format(val,suffix){
  if(val===null||val===undefined) return "--";
  return val+suffix;
}

async function fetchData(){

  try{
    const res = await fetch(PROXY + "?callsign=" + CALLSIGN);
    const data = await res.json();

    document.getElementById("debug").innerText = data.debug;

    if(!data.found){
      document.getElementById("status").innerText = "NO DATA";
      return;
    }

    document.getElementById("status").innerText = "AIRBORNE";

    const ft = Math.round(data.altitudeMeters * 3.28084);
    const kmh = Math.round(data.velocityMs * 3.6);

    document.getElementById("alt").innerText = format(ft," ft");
    document.getElementById("spd").innerText = format(kmh," km/h");
    document.getElementById("hdg").innerText = format(Math.round(data.heading),"°");

    const lat = data.latitude?.toFixed(2);
    const lon = data.longitude?.toFixed(2);

    document.getElementById("pos").innerText = lat+" / "+lon;

  }catch(e){
    document.getElementById("debug").innerText = "Virhe: "+e.message;
  }
}

setInterval(updateClock,1000);
setInterval(fetchData,10000);

fetchData();
updateClock();

</script>

</body>
</html>
