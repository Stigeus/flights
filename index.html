<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Display</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: #0b1f36;
      --text: #ffffff;
      --muted: #9eb3c9;
      --accent: #00a3e0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0, 163, 224, 0.18), transparent 34%),
        linear-gradient(145deg, #030811, var(--bg));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: min(92vw, 1120px);
      height: min(88vh, 720px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: 34px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(6, 17, 31, 0.72);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .main {
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 16px;
    }

    .flight-number {
      font-size: clamp(56px, 13vw, 150px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
    }

    .route {
      display: flex;
      align-items: center;
      gap: clamp(14px, 3vw, 38px);
      font-size: clamp(34px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .arrow { color: var(--accent); font-weight: 300; }

    .status {
      margin-top: 6px;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(0, 163, 224, 0.14);
      color: var(--accent);
      font-size: clamp(16px, 3vw, 28px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .countdown-label {
      margin-top: 16px;
      color: var(--muted);
      font-size: clamp(16px, 3vw, 26px);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .countdown {
      font-size: clamp(48px, 11vw, 132px);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .progress-wrap {
      width: min(620px, 80vw);
      height: 10px;
      background: rgba(255,255,255,0.13);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #ffffff);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    footer {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .info-box {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.07);
      min-height: 88px;
    }

    .info-label {
      color: var(--muted);
      font-size: clamp(11px, 1.8vw, 16px);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .info-value {
      font-size: clamp(15px, 2.2vw, 26px);
      font-weight: 700;
      line-height: 1.05;
    }

    .live-note {
      color: var(--muted);
      font-size: clamp(10px, 1.5vw, 13px);
      margin-top: 7px;
      line-height: 1.2;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: clamp(24px, 5vw, 56px);
      line-height: 1.2;
    }

    @media (max-width: 700px) {
      .screen {
        width: 100vw;
        height: 100vh;
        border: 0;
        border-radius: 0;
        padding: 22px;
      }
      footer { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <section class="screen" id="app">
    <header>
      <div>Flight Display</div>
      <div id="clock">--:--</div>
    </header>

    <main class="main" id="main"></main>
    <footer id="footer"></footer>
  </section>

  <script>
    const flights = [
      {
        flightNumber: "AY142",
        openskyCallsign: "FIN142",
        from: "BKK",
        to: "HEL",
        departure: "2026-04-28T06:58:00+07:00",
        arrival: "2026-04-28T15:33:00+03:00",
        arrivalTimeZone: "Europe/Helsinki"
      },
      {
        flightNumber: "AY1361",
        openskyCallsign: "FIN1361",
        from: "HEL",
        to: "MAN",
        departure: "2026-05-08T08:20:00+03:00",
        arrival: "2026-05-08T09:20:00+01:00",
        arrivalTimeZone: "Europe/London"
      }
    ];

    let liveData = null;
    let liveStatus = "Haetaan live-dataa";
    let lastLiveFetch = 0;
    let lastFlightKey = "";

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function normalizeCallsign(value) {
      return String(value || "").trim().toUpperCase();
    }

    function formatDuration(ms) {
      const totalMinutes = Math.max(0, Math.floor(ms / 60000));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${hours}h ${pad(minutes)}m`;
    }

    function formatTime(date, timeZone) {
      return new Intl.DateTimeFormat("fi-FI", {
        hour: "2-digit",
        minute: "2-digit",
        timeZone
      }).format(date);
    }

    function formatLiveValue(value, suffix = "") {
      if (value === null || value === undefined || Number.isNaN(value)) return "--";
      return `${value}${suffix}`;
    }

    function metersToFeet(meters) {
      if (meters === null || meters === undefined) return null;
      return Math.round(meters * 3.28084 / 100) * 100;
    }

    function msToKmh(ms) {
      if (ms === null || ms === undefined) return null;
      return Math.round(ms * 3.6);
    }

    function formatCoordinate(value, type) {
      if (value === null || value === undefined) return "--";
      const suffix = type === "lat" ? (value >= 0 ? "N" : "S") : (value >= 0 ? "E" : "W");
      return `${Math.abs(value).toFixed(2)}°${suffix}`;
    }

    function getRelevantFlight(now) {
      const sorted = flights
        .map(f => ({
          ...f,
          departureDate: new Date(f.departure),
          arrivalDate: new Date(f.arrival)
        }))
        .sort((a, b) => a.departureDate - b.departureDate);

      return sorted.find(f => f.arrivalDate > now) || null;
    }

    async function fetchOpenSkyLiveData(flight) {
      if (!flight || !flight.openskyCallsign) return;

      const flightKey = flight.openskyCallsign;
      const now = Date.now();

      if (lastFlightKey !== flightKey) {
        liveData = null;
        liveStatus = "Haetaan live-dataa";
        lastLiveFetch = 0;
        lastFlightKey = flightKey;
      }

      if (now - lastLiveFetch < 60000) return;
      lastLiveFetch = now;

      try {
        liveStatus = "Haetaan live-dataa";
        const response = await fetch("https://opensky-network.org/api/states/all");

        if (!response.ok) {
          throw new Error(`OpenSky ${response.status}`);
        }

        const data = await response.json();
        const wanted = normalizeCallsign(flight.openskyCallsign);
        const state = (data.states || []).find(row => normalizeCallsign(row[1]) === wanted);

        if (!state) {
          liveData = null;
          liveStatus = "Ei live-osumaa";
          return;
        }

        liveData = {
          icao24: state[0],
          callsign: normalizeCallsign(state[1]),
          longitude: state[5],
          latitude: state[6],
          altitudeMeters: state[7],
          onGround: state[8],
          velocityMs: state[9],
          heading: state[10],
          verticalRateMs: state[11],
          lastContact: state[4] ? new Date(state[4] * 1000) : null
        };
        liveStatus = "Live";
      } catch (error) {
        liveData = null;
        liveStatus = "Live-data ei saatavilla";
        console.warn(error);
      }
    }

    function render() {
      const now = new Date();
      document.getElementById("clock").textContent = formatTime(now, "Europe/Helsinki");

      const flight = getRelevantFlight(now);
      const main = document.getElementById("main");
      const footer = document.getElementById("footer");

      if (!flight) {
        main.innerHTML = `<div class="empty">Ei tulevia lentoja</div>`;
        footer.innerHTML = "";
        return;
      }

      fetchOpenSkyLiveData(flight);

      const dep = flight.departureDate;
      const arr = flight.arrivalDate;
      const total = arr - dep;
      const elapsed = now - dep;

      let status = "NEXT FLIGHT";
      let label = "Lähtöön";
      let timeText = formatDuration(dep - now);
      let progress = 0;

      if (now >= dep && now < arr) {
        status = liveData && liveData.onGround ? "ON GROUND" : "AIRBORNE";
        label = "Lentoa jäljellä";
        timeText = formatDuration(arr - now);
        progress = Math.min(100, Math.max(0, (elapsed / total) * 100));
      } else if (now >= arr) {
        status = "LANDED";
        label = "Saapunut";
        timeText = "00h 00m";
        progress = 100;
      }

      const altitudeFt = liveData ? metersToFeet(liveData.altitudeMeters) : null;
      const speedKmh = liveData ? msToKmh(liveData.velocityMs) : null;
      const heading = liveData && liveData.heading !== null ? Math.round(liveData.heading) : null;
      const liveAge = liveData && liveData.lastContact ? Math.max(0, Math.round((now - liveData.lastContact) / 1000)) : null;
      const liveStatusText = liveData ? `${liveStatus}${liveAge !== null ? ` · ${liveAge}s sitten` : ""}` : liveStatus;

      main.innerHTML = `
        <div class="flight-number">${flight.flightNumber}</div>
        <div class="route">
          <span>${flight.from}</span>
          <span class="arrow">→</span>
          <span>${flight.to}</span>
        </div>
        <div class="status">${status}</div>
        <div class="countdown-label">${label}</div>
        <div class="countdown">${timeText}</div>
        <div class="progress-wrap"><div class="progress" style="width:${progress}%"></div></div>
      `;

      footer.innerHTML = `
        <div class="info-box">
          <div class="info-label">Lähtö</div>
          <div class="info-value">${formatTime(dep, "Europe/Helsinki")}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Saapuminen</div>
          <div class="info-value">${formatTime(arr, flight.arrivalTimeZone || "Europe/Helsinki")}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Korkeus</div>
          <div class="info-value">${formatLiveValue(altitudeFt, " ft")}</div>
          <div class="live-note">${liveStatusText}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Nopeus</div>
          <div class="info-value">${formatLiveValue(speedKmh, " km/h")}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Suunta</div>
          <div class="info-value">${formatLiveValue(heading, "°")}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Sijainti</div>
          <div class="info-value">${liveData ? `${formatCoordinate(liveData.latitude, "lat")} ${formatCoordinate(liveData.longitude, "lon")}` : "--"}</div>
        </div>
      `;
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
