<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flight Display</title>
<style>
:root{--bg:#06111f;--text:#fff;--muted:#9eb3c9;--accent:#00a3e0}
*{box-sizing:border-box}
body{margin:0;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at top left,rgba(0,163,224,.18),transparent 34%),linear-gradient(145deg,#030811,var(--bg));color:var(--text);font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center}
.screen{width:min(92vw,1120px);height:min(88vh,720px);padding:34px;border-radius:28px;background:rgba(6,17,31,.78);border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 80px rgba(0,0,0,.45);display:grid;grid-template-rows:auto 1fr auto auto;gap:18px}
header{display:flex;justify-content:space-between;color:var(--muted);font-size:clamp(14px,2vw,22px);letter-spacing:.12em;text-transform:uppercase}
.main{display:grid;align-content:center;justify-items:center;text-align:center;gap:14px}
.flight{font-size:clamp(58px,13vw,150px);font-weight:800;letter-spacing:-.06em;line-height:.9}
.route{font-size:clamp(34px,8vw,96px);font-weight:700;letter-spacing:.03em}
.arrow{color:var(--accent);font-weight:300}
.status{margin-top:4px;padding:10px 22px;border-radius:999px;background:rgba(0,163,224,.14);color:var(--accent);font-size:clamp(16px,3vw,28px);font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.time-label{margin-top:14px;color:var(--muted);font-size:clamp(16px,3vw,26px);text-transform:uppercase;letter-spacing:.12em}
.time{font-size:clamp(48px,11vw,132px);font-weight:800;letter-spacing:-.05em;line-height:.95}
.progress-wrap{width:min(620px,80vw);height:10px;background:rgba(255,255,255,.13);border-radius:999px;overflow:hidden;margin-top:4px}
.progress{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#fff);border-radius:999px;transition:width .4s ease}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.box{background:rgba(255,255,255,.07);padding:14px;border-radius:18px;min-height:88px}
.label{color:var(--muted);font-size:clamp(11px,1.8vw,16px);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;white-space:nowrap}
.value{font-size:clamp(15px,2.2vw,26px);font-weight:700;line-height:1.05}
.note{color:var(--muted);font-size:clamp(10px,1.5vw,13px);margin-top:7px;line-height:1.2}
.debug{font-size:12px;color:var(--muted);text-align:center;min-height:16px}
.list{width:min(820px,90vw);display:grid;gap:10px;margin-top:10px}
.list-row{display:grid;grid-template-columns:1.1fr 1fr 2fr 1.2fr;gap:12px;align-items:center;padding:14px 18px;border-radius:16px;background:rgba(255,255,255,.07);font-size:clamp(16px,2.4vw,24px)}
.list-head{color:var(--muted);font-size:clamp(18px,3vw,34px);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
@media(max-width:700px){.screen{width:100vw;height:100vh;border:0;border-radius:0;padding:22px}.grid{grid-template-columns:repeat(2,1fr)}.list-row{grid-template-columns:1fr;font-size:18px}}
</style>
</head>
<body>
<div class="screen">
<header><div>Flight Display v1.4-list-admin</div><div id="clock">--:--</div></header>
<main class="main" id="main"></main>
<div class="grid" id="detailGrid"></div>
<div class="debug" id="debug">Debug: odottaa</div>
</div>

<script>
const PROXY="https://script.google.com/macros/s/AKfycbw6IsyzgvOZtdpqCO5aDQUnH6UlSm2Q8LJTNqz-k4M90-YQGP_YdB7LdK6Wt0RmQZ6x_A/exec";
let flights=[];
let activeFlight=null;
let liveData=null;
let liveStatus="Odottaa lentoikkunaa";
let lastLiveFetch=0;
let lastFlightsFetch=0;
let lastCallsign="";
const LIVE_FETCH_INTERVAL_MS=60000;
const FLIGHTS_FETCH_INTERVAL_MS=300000;

function pad(n){return String(n).padStart(2,"0")}
function formatDuration(ms){const tm=Math.max(0,Math.floor(ms/60000));return `${Math.floor(tm/60)}h ${pad(tm%60)}m`}
function formatTime(d,tz="Europe/Helsinki"){return new Intl.DateTimeFormat("fi-FI",{hour:"2-digit",minute:"2-digit",timeZone:tz}).format(d)}
function formatDate(d,tz="Europe/Helsinki"){return new Intl.DateTimeFormat("fi-FI",{day:"2-digit",month:"2-digit",timeZone:tz}).format(d)}
function formatValue(v,s=""){return v===null||v===undefined||Number.isNaN(v)?"--":`${v}${s}`}
function metersToFeet(m){return m===null||m===undefined?null:Math.round(m*3.28084/100)*100}
function msToKmh(ms){return ms===null||ms===undefined?null:Math.round(ms*3.6)}
function formatCoordinate(v,type){if(v===null||v===undefined)return"--";const s=type==="lat"?(v>=0?"N":"S"):(v>=0?"E":"W");return `${Math.abs(v).toFixed(2)}°${s}`}
function estimateLocalTimeFromLongitude(lon){if(lon===null||lon===undefined||Number.isNaN(lon))return"--";const oh=Math.round(lon/15);const d=new Date(Date.now()+oh*3600000);const sign=oh>=0?"+":"-";return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())} UTC${sign}${Math.abs(oh)}`}

async function fetchFlights(force=false){
  const now=Date.now();
  if(!force && now-lastFlightsFetch<FLIGHTS_FETCH_INTERVAL_MS) return;
  lastFlightsFetch=now;
  try{
    const res=await fetch(`${PROXY}?action=flights`,{cache:"no-store"});
    if(!res.ok) throw new Error(`Flights HTTP ${res.status}`);
    const data=await res.json();
    flights=(data.flights||[]).sort((a,b)=>new Date(a.departure)-new Date(b.departure));
    document.getElementById("debug").innerText=`Lentoja: ${flights.length}`;
  }catch(e){
    document.getElementById("debug").innerText=`Virhe lentolistassa: ${e.message}`;
  }
}

function currentFlight(){
  const now=new Date();
  return flights.find(f=>new Date(f.arrival)>now)||null;
}

function getBestArrivalDate(f){
  if(liveData&&liveData.arrivalBest)return new Date(liveData.arrivalBest);
  return new Date(f.arrival);
}

function getBestStatus(){
  if(liveData&&liveData.flightStatus)return String(liveData.flightStatus).toUpperCase();
  return null;
}

function shouldFetchLiveData(f){
  const now=new Date();
  const dep=new Date(f.departure);
  const arr=getBestArrivalDate(f);
  return now>=new Date(dep.getTime()-3600000)&&now<=new Date(arr.getTime()+900000);
}

async function fetchLiveData(f){
  if(!f)return;
  if(lastCallsign!==f.callsign){
    liveData=null;liveStatus="Haetaan live-dataa";lastLiveFetch=0;lastCallsign=f.callsign;
  }
  if(!shouldFetchLiveData(f)){
    liveData=null;liveStatus="Odottaa lentoikkunaa";
    return;
  }
  const now=Date.now();
  if(now-lastLiveFetch<LIVE_FETCH_INTERVAL_MS)return;
  lastLiveFetch=now;
  try{
    const url=`${PROXY}?action=live&callsign=${encodeURIComponent(f.callsign)}&flight_iata=${encodeURIComponent(f.flightIata)}`;
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error(`Proxy HTTP ${res.status}`);
    const data=await res.json();
    document.getElementById("debug").innerText=data.debug||"Proxy vastasi";
    if(!data.found){liveData=null;liveStatus="Ei live-osumaa";return}
    liveData=data;liveStatus="Live";
  }catch(e){
    liveData=null;liveStatus="Live-data ei saatavilla";
    document.getElementById("debug").innerText=`Virhe: ${e.message}`;
  }
}

function renderList(){
  const main=document.getElementById("main");
  const grid=document.getElementById("detailGrid");
  const upcoming=flights.filter(f=>new Date(f.arrival)>new Date()).slice(0,8);
  grid.innerHTML="";
  main.innerHTML=`
    <div class="list-head">Tulevat lennot</div>
    <div class="list">
      ${upcoming.map(f=>{
        const dep=new Date(f.departure);
        const arr=new Date(f.arrival);
        return `<div class="list-row">
          <div>${f.flightNumber}</div>
          <div>${f.from} → ${f.to}</div>
          <div>${formatDate(dep,f.departureTimeZone)} ${formatTime(dep,f.departureTimeZone)}</div>
          <div>${formatTime(arr,f.arrivalTimeZone)}</div>
        </div>`;
      }).join("")||"<div>Ei tulevia lentoja</div>"}
    </div>`;
}

function renderDetail(f){
  fetchLiveData(f);
  const now=new Date(),dep=new Date(f.departure),arr=getBestArrivalDate(f);
  const diffToDep=dep-now,total=arr-dep,elapsed=now-dep;
  let status="NEXT FLIGHT",label="Lähtöön",time=formatDuration(diffToDep),progress=0;

  if(now>=dep&&now<arr){
    status=getBestStatus()||(liveData&&liveData.onGround?"ON GROUND":"AIRBORNE");
    label="Lentoa jäljellä";
    time=formatDuration(arr-now);
    progress=Math.min(100,Math.max(0,(elapsed/total)*100));
  }else if(now>=arr){
    status="LANDED";label="Saapunut";time="00h 00m";progress=100;
  }

  document.getElementById("main").innerHTML=`
    <div class="flight">${f.flightNumber}</div>
    <div class="route"><span>${f.from}</span> <span class="arrow">→</span> <span>${f.to}</span></div>
    <div class="status">${status}</div>
    <div class="time-label">${label}</div>
    <div class="time">${time}</div>
    <div class="progress-wrap"><div class="progress" style="width:${progress}%"></div></div>
  `;

  const useLive=liveData&&now>=dep&&now<arr;
  const alt=useLive?metersToFeet(liveData.altitudeMeters):null;
  const spd=useLive?msToKmh(liveData.velocityMs):null;
  const hdg=useLive&&liveData.heading!==null?Math.round(liveData.heading):null;
  const pos=useLive&&liveData.latitude!==null&&liveData.longitude!==null?`${formatCoordinate(liveData.latitude,"lat")} ${formatCoordinate(liveData.longitude,"lon")}`:f.callsign;
  const locTime=useLive?estimateLocalTimeFromLongitude(liveData.longitude):"--";
  const liveAge=useLive&&liveData.lastContact?`${liveStatus} · ${Math.max(0,Math.round((new Date()-new Date(liveData.lastContact))/1000))}s sitten`:liveStatus;

  document.getElementById("detailGrid").innerHTML=`
    <div class="box"><div class="label">Lähtö</div><div class="value">${formatTime(dep,f.departureTimeZone)}</div></div>
    <div class="box"><div class="label">Saapuminen</div><div class="value">${formatTime(arr,f.arrivalTimeZone)}</div><div class="note">HEL ${formatTime(arr,"Europe/Helsinki")}</div></div>
    <div class="box"><div class="label">Korkeus</div><div class="value">${formatValue(alt," ft")}</div><div class="note">${liveAge}</div></div>
    <div class="box"><div class="label">Nopeus</div><div class="value">${formatValue(spd," km/h")}</div></div>
    <div class="box"><div class="label">Suunta</div><div class="value">${formatValue(hdg,"°")}</div></div>
    <div class="box"><div class="label">Sijainnin aika</div><div class="value">${locTime}</div><div class="note">${pos}</div></div>
  `;
}

async function render(){
  document.getElementById("clock").innerText=formatTime(new Date(),"Europe/Helsinki");
  await fetchFlights(false);
  const f=currentFlight();
  if(!f){renderList();return;}
  const dep=new Date(f.departure);
  const hoursToDep=(dep-new Date())/3600000;
  if(hoursToDep>24){renderList();return;}
  renderDetail(f);
}

(async()=>{await fetchFlights(true);render();setInterval(render,5000);})();
</script>
</body>
</html>
